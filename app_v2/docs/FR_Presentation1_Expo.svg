     width="150"
     height="34"
     rx="12"
     id="rect21" />
  <text
     class="chipText"
     x="80"
     y="748"
     id="text21">Passthrough</text>
  <text
     class="cardTitle"
     x="56"
     y="790"
     id="text22">Flux brut</text>
  <text
     class="body"
     x="56"
     y="816"
     id="text23">Vidéo seule, sans IA : utile comme référence.</text>
  <text
     class="metric"
     x="56"
     y="842"
     id="text24">Latence minimale</text>
  <rect
     class="card"
     x="584"
     y="708"
