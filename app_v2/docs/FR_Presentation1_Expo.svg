     height="34"
     rx="12"
     id="rect25" />
  <text
     class="chipText"
     x="626"
     y="748"
     id="text25">YOLO Global</text>
  <text
     class="cardTitle"
     x="604"
     y="790"
     id="text26">Détection plein cadre</text>
  <text
     class="body"
     x="604"
     y="816"
     id="text27">Boîtes + silhouettes sur l’image complète.</text>
  <text
     class="metric"
     x="604"
     y="842"
     id="text28">Mode le plus équilibré</text>
  <rect
     class="card"
     x="36"
     y="878"
     width="500"
     height="150"
     rx="18"
     id="rect28" />
  <rect
     class="accent2"
     x="54"
     y="896"
     width="150"
     height="34"
     rx="12"
     id="rect29" />
  <text
     class="chipText"
     x="78"
     y="918"
     id="text29">YOLO Tiling</text>
  <text
     class="cardTitle"
     x="56"
     y="960"
     id="text30">Détection par tuiles</text>
  <text
     class="body"
     x="56"
     y="986"
     id="text31">Découpe la scène en crops pour mieux voir les petites personnes.</text>
  <text
     class="metric"
     x="56"
     y="1012"
     id="text32">Plus de détails locaux</text>
  <rect
     class="card"
     x="584"
     y="878"
     width="500"
     height="150"
     rx="18"
     id="rect32" />
  <rect
     class="green"
     x="602"
     y="896"
     width="176"
     height="34"
     rx="12"
     id="rect33" />
  <text
     class="chipText"
     x="627"
     y="918"
     id="text33">Density Map</text>
  <text
     class="cardTitle"
     x="604"
     y="960"
     id="text34">Carte de densité</text>
  <text
     class="body"
     x="604"
     y="986"
     id="text35">Montre la densité de foule au lieu de dessiner des boîtes.</text>
  <text
     class="metric"
     x="604"
     y="1012"
     id="text36">Idéal pour les foules denses</text>
  <rect
     class="card"
     x="36"
     y="1048"
     width="500"
     height="150"
     rx="18"
     id="rect36" />
  <rect
     class="orange"
     x="54"
     y="1066"
     width="196"
     height="34"
     rx="12"
     id="rect37" />
  <text
     class="chipText"
     x="79"
     y="1088"
     id="text37">YOLO-CROWD Global</text>
  <text
     class="cardTitle"
     x="56"
     y="1130"
     id="text38">Détecteur foule plein cadre</text>
  <text
     class="body"
     x="56"
     y="1156"
     id="text39">Spécialisé pour les groupes compacts et les têtes.</text>
  <text
     class="metric"
     x="56"
     y="1182"
     id="text40">Détection foule spécialisée</text>
  <rect
     class="card"
     x="584"
     y="1048"
     width="500"
     height="150"
     rx="18"
     id="rect40" />
  <rect
     class="purple"
     x="602"
     y="1066"
     width="206"
     height="34"
     rx="12"
     id="rect41" />
  <text
     class="chipText"
     x="626"
     y="1088"
     id="text41">YOLO-CROWD Tiling</text>
  <text
     class="cardTitle"
     x="604"
     y="1130"
     id="text42">Foule + tuiles</text>
  <text
     class="body"
     x="604"
     y="1156"
     id="text43">Meilleure couverture dans les scènes très chargées.</text>
  <text
     class="metric"
     x="604"
     y="1182"
     id="text44">Mode dense le plus complet</text>
  <rect
     class="card"
     x="36"
     y="1228"
     width="1050"
     height="263.31311"
     rx="18"
     id="rect44" />
  <text
     class="section"
     x="58"
     y="1260"
     id="text45">Messages clés à retenir</text>
  <text
     class="body"
     x="58"
     y="1292"
     id="text46">1. Une seule caméra 4K alimente plusieurs lectures possibles de la même scène.</text>
  <text
     class="body"
     x="58"
     y="1318"
     id="text47">2. Les boîtes, les silhouettes et les heatmaps permettent d’expliquer visuellement les différences entre modèles.</text>
  <text
     class="body"
     x="58"
     y="1344"
     id="text48"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">3. On peut comparer instantanément les résultats selon le mode choisi.</text>
  <text
     class="body"
     x="58"
     y="1370"
     id="text49">4. Le projet montre à la fois du traitement vidéo temps réel, de l’IA embarquée GPU et une interface de démonstration claire.</text>
  <rect
     class="gray"
     x="56"
     y="1514"
     width="14"
     height="14"
     rx="4"
     id="rect50" />
