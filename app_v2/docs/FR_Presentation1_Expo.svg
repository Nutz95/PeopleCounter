  <text
     class="title"
     x="48"
     y="58"
     id="text2">PeopleCounter — Panneau 1</text>
  <text
     class="title"
     x="48"
     y="97"
     id="text3">Ce que voit le visiteur</text>
  <text
     class="subtitle"
     x="50"
     y="126"
     id="text4">Une caméra 4K, plusieurs modes d’analyse, et une interface qui rend l’IA visible en direct.</text>
  <rect
     class="card"
     x="36"
     y="176"
     width="1050"
     height="188"
     rx="18"
     id="rect4" />
  <text
     class="section"
     x="58"
     y="208"
     id="text5">L’idée de la démo</text>
  <text
     class="body"
     x="58"
     y="238"
     id="text6">PeopleCounter reçoit un flux vidéo 4K en direct, l’analyse avec plusieurs modèles IA possibles, puis affiche le résultat dans un navigateur.</text>
  <text
     class="body"
     x="58"
     y="262"
     id="text7"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">On voit immédiatement la différence entre les modes : détection globale, tiling, crowd counting, ou flux brut sans IA.</text>
  <rect
     class="accent"
     x="64"
     y="292"
     width="176"
     height="42"
     rx="14"
     id="rect7" />
  <text
     class="chipText"
     x="92.341553"
     y="318"
     id="text8"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Caméra 4K en direct</text>
  <rect
     class="accent2"
     x="260"
     y="292"
     width="188"
     height="42"
     rx="14"
     id="rect8" />
  <text
     class="chipText"
     x="287.57495"
     y="318"
     id="text9"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Modes sélectionnables</text>
  <rect
     class="green"
     x="468"
     y="292"
     width="202"
     height="42"
     rx="14"
     id="rect9" />
  <text
     class="chipText"
     x="519.03125"
     y="318"
     id="text10"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Comptage visible</text>
  <rect
     class="orange"
     x="688"
     y="292"
     width="196"
     height="42"
     rx="14"
     id="rect10" />
  <text
     class="chipText"
     x="733.4541"
     y="318"
     id="text11"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Overlays en direct</text>
  <rect
     class="purple"
     x="902"
     y="292"
     width="160"
     height="42"
     rx="14"
     id="rect11" />
  <text
     class="chipText"
     x="938.71216"
     y="318"
     id="text12"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Bascule rapide</text>
  <rect
     class="card"
     x="36"
     y="392"
     width="1050"
     height="246"
     rx="18"
     id="rect12" />
  <text
     class="section"
     x="58"
     y="424"
     id="text13">Ce qu’on voit à l’écran</text>
  <text
     class="body"
     x="58"
     y="458"
     id="text14">• vidéo 4K en direct avec superpositions IA dessinées en temps réel</text>
  <text
     class="body"
     x="58"
     y="486"
     id="text15">• nombre de personnes mis à jour en continu</text>
  <text
     class="body"
     x="58"
     y="514"
     id="text16">• changement de mode instantané pour comparer les approches</text>
  <text
     class="body"
     x="58"
     y="542"
     id="text17">• affichage des performances : latence, charge GPU, historique</text>
  <text
     class="body"
     x="58"
     y="580"
     id="text18">La démo n’est pas seulement “un compteur” :</text>
  <text
     class="small"
     x="58"
     y="606"
     id="text19"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:12px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif;-inkscape-font-specification:'Microsoft Sans Serif, Arial, sans-serif, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal;fill:#234760"><tspan
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:13.3333px;font-family:Sans;-inkscape-font-specification:'Sans, Normal';font-variant-ligatures:normal;font-variant-caps:normal;font-variant-numeric:normal;font-variant-east-asian:normal"
       id="tspan57">c’est aussi un outil pédagogique pour montrer comment plusieurs stratégies IA lisent la même scène différemment.</tspan></text>
  <text
     class="section"
     x="38"
     y="682"
     id="text20">Les 6 modes disponibles</text>
  <rect
     class="card"
     x="36"
     y="708"
     width="500"
     height="150"
     rx="18"
     id="rect20" />
  <rect
