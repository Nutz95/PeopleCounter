     id="text2">PeopleCounter — Panneau 5</text>
  <text
     class="title"
     x="48"
     y="97"
     id="text3">La stack logicielle</text>
  <text
     class="subtitle"
     x="50"
     y="126"
     id="text4">Une vue “carte technique” inspirée du schéma Mermaid : conteneur, briques GPU, IA, web et navigateur se lisent d’un seul regard.</text>
  <rect
     class="card"
     x="36"
     y="176"
     width="1050"
     height="140"
     rx="18"
     id="rect4" />
  <text
     class="section"
     x="58"
     y="208"
     id="text5">Idée générale</text>
  <text
     class="body"
     x="58"
     y="238"
     id="text6">Tout tourne dans Docker : modèles IA, composants vidéo GPU, services web et diffusion vers le navigateur.</text>
  <text
     class="body"
     x="58"
     y="262"
     id="text7">Le schéma central reprend cette architecture comme une carte de la démo, plus parlante qu’un tableau de composants.</text>
