  <text
     class="section"
     x="58"
     y="1334"
     id="text48">Comment raconter ce panneau</text>
  <text
     class="body"
     x="58"
     y="1366"
     id="text49">1. <tspan
   class="cardTitle"
   id="tspan48">Docker</tspan> encapsule toute la démo : bibliothèques GPU, moteurs IA, services web et modèles.</text>
  <text
     class="body"
     x="58"
     y="1392"
     id="text50">2. <tspan
   class="cardTitle"
   id="tspan49">Le GPU vidéo</tspan> alimente les briques d’IA sans sortir inutilement des données vers le CPU.</text>
  <text
     class="body"
     x="58"
     y="1418"
     id="text51">3. <tspan
   class="cardTitle"
   id="tspan50">Les services web</tspan> servent de passerelle vers le navigateur, où l’on voit la vidéo, les overlays et les métriques.</text>
  <text
     class="body"
     x="58"
     y="1444"
     id="text52">4. Les trois familles de modèles en haut montrent que le logiciel sait changer de lecture de la foule sans changer de caméra.</text>
