     width="1122.5197"
     height="146"
     id="rect2" />
  <text
     class="title"
     x="48"
     y="58"
     id="text2">PeopleCounter — Panneau 2</text>
  <text
     class="title"
     x="48"
     y="97"
     id="text3">À l’intérieur du pipeline GPU</text>
  <text
     class="subtitle"
     x="50"
     y="126"
     id="text4">Décodage, preprocess et inférence restent sur le GPU autant que possible pour limiter les copies et garder une faible latence.</text>
  <rect
     class="card"
     x="36"
     y="176"
     width="1050"
     height="154"
     rx="18"
     id="rect4" />
  <text
     class="section"
     x="58"
     y="208"
     id="text5">Idée centrale</text>
  <text
     class="body"
     x="58"
     y="238"
     id="text6">Le CPU ne fait presque que l’orchestration. Le gros du travail — décodage vidéo, conversion, redimensionnement et inférence — reste côté GPU.</text>
  <rect
     class="accent2"
     x="64"
     y="270"
     width="190"
     height="42"
     rx="14"
     id="rect6" />
  <text
     class="chipText"
     x="91"
     y="296"
     id="text7">Décodage matériel</text>
  <rect
     class="accent2"
     x="278"
     y="270"
     width="210"
     height="42"
     rx="14"
     id="rect7" />
  <text
     class="chipText"
     x="306"
     y="296"
     id="text8">Preprocess sur GPU</text>
  <rect
     class="orange"
     x="512"
     y="270"
     width="186"
     height="42"
     rx="14"
     id="rect8" />
  <text
     class="chipText"
     x="540"
     y="296"
     id="text9">Inférence TensorRT</text>
  <rect
     class="purple"
     x="722"
     y="270"
     width="170"
     height="42"
     rx="14"
     id="rect9" />
  <text
     class="chipText"
     x="750"
     y="296"
     id="text10">Sortie vidéo</text>
  <rect
     class="card"
     x="36"
     y="362"
     width="1050"
     height="248"
     rx="18"
     id="rect10" />
  <text
     class="section"
     x="58"
     y="394"
     id="text11">Chaîne principale</text>
  <rect
     class="accent"
     x="58"
     y="438"
     width="156"
     height="44"
     rx="12"
     id="rect11" />
  <text
     class="chipText"
     x="85"
     y="466"
     id="text12">Caméra 4K</text>
  <text
     class="arrow"
     x="235"
     y="468"
     id="text13">→</text>
  <rect
     class="accent2"
     x="274"
     y="438"
     width="174"
     height="44"
     rx="12"
     id="rect13" />
  <text
     class="chipText"
     x="303"
     y="466"
     id="text14">NVDEC</text>
  <text
     class="arrow"
     x="469"
     y="468"
     id="text15">→</text>
  <rect
     class="accent2"
     x="508"
     y="438"
     width="220"
     height="44"
     rx="12"
     id="rect15" />
  <text
     class="chipText"
     x="536"
     y="466"
     id="text16">Noyau CUDA fusionné</text>
  <text
     class="arrow"
     x="750"
     y="468"
     id="text17">→</text>
  <rect
     class="orange"
     x="790"
     y="438"
     width="176"
     height="44"
     rx="12"
     id="rect17" />
  <text
     class="chipText"
     x="820"
     y="466"
     id="text18">TensorRT</text>
  <text
     class="arrow"
     x="986"
     y="468"
     id="text19">→</text>
  <rect
     class="purple"
     x="1020"
     y="438"
     width="48"
     height="44"
     rx="12"
     id="rect19" />
  <text
     class="chipText"
     x="1034"
     y="466"
     id="text20">UI</text>
  <text
     class="body"
     x="58"
     y="524"
     id="text21">• <tspan
   class="cardTitle"
   id="tspan20">NVDEC</tspan> décode le flux H.264 avec le bloc matériel du GPU : pas besoin de monopoliser les cœurs shader.</text>
  <text
     class="body"
     x="58"
     y="553.61475"
     id="text22"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• <tspan
   class="cardTitle"
   id="tspan21"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Noyau CUDA fusionné</tspan> échantillonne directement les plans YUV à la résolution cible, puis convertit en RGB sur un petit tenseur.</text>
  <text
     class="body"
     x="58"
     y="584"
     id="text23"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• <tspan
   class="cardTitle"
   id="tspan22"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">TensorRT</tspan> exécute les modèles IA avec des moteurs optimisés pour le GPU.</text>
  <rect
     class="card"
     x="36"
     y="640"
     width="500"
     height="240"
     rx="18"
     id="rect23" />
  <rect
     class="accent2"
     x="54"
     y="658"
     width="174"
     height="34"
     rx="12"
     id="rect24" />
  <text
     class="chipText"
     x="79"
     y="680"
     id="text24">NVDEC</text>
  <text
     class="cardTitle"
     x="56"
     y="720"
     id="text25">Décodage “gratuit” côté GPU</text>
  <text
     class="body"
     x="56"
     y="748"
     id="text26">Le flux caméra est décodé par la puce de décodage vidéo intégrée au GPU.</text>
  <text
     class="body"
     x="56"
     y="772"
     id="text27">Ce travail ne consomme pas les mêmes ressources que l’inférence.</text>
  <text
     class="metric"
     x="56"
     y="812"
     id="text28">=&gt; libère les unités de calcul pour l’IA</text>
  <rect
     class="card"
     x="584"
     y="640"
     width="500"
     height="240"
     rx="18"
     id="rect28" />
  <rect
     class="accent2"
     x="602"
     y="658"
     width="232"
     height="34"
     rx="12"
     id="rect29" />
  <text
     class="chipText"
     x="628"
     y="680"
     id="text29">Noyau CUDA fusionné</text>
  <text
     class="cardTitle"
     x="604"
     y="720"
     id="text30">Resize + conversion en une seule étape</text>
  <text
     class="body"
     x="604"
     y="748"
     id="text31"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif"><tspan
       sodipodi:role="line"
       id="tspan51"
       x="604"
       y="748">On évite de produire une énorme image RGB pleine résolution</tspan><tspan
       sodipodi:role="line"
       id="tspan52"
       x="604"
       y="765.5">avant de la réduire.</tspan></text>
  <text
     class="body"
     x="604"
     y="787.96289"
     id="text32"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif"><tspan
       sodipodi:role="line"
       id="tspan53"
       x="604"
       y="787.96289">Le preprocess lit directement le YUV, applique la géométrie utile,</tspan><tspan
       sodipodi:role="line"
       id="tspan54"
       x="604"
       y="805.46289">puis ne convertit que le tenseur cible.</tspan></text>
  <text
     class="metric"
     x="604"
     y="832"
     id="text33"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:16px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">=&gt; moins de mémoire, moins de copies</text>
  <rect
     class="card"
     x="36"
     y="910"
     width="500"
     height="240"
     rx="18"
     id="rect33" />
  <rect
     class="accent2"
     x="54"
     y="928"
     width="192"
     height="34"
     rx="12"
     id="rect34" />
  <text
     class="chipText"
     x="80"
     y="950"
     id="text34">GpuTensorPool</text>
  <text
     class="cardTitle"
     x="56"
     y="990"
     id="text35">Mémoire GPU réutilisée</text>
  <text
     class="body"
     x="56"
     y="1018"
     id="text36">Des tampons tensoriels sont préalloués puis réutilisés image après image.</text>
  <text
     class="body"
     x="56"
     y="1042"
     id="text37">On évite ainsi des allocations GPU répétées pendant la démo.</text>
  <text
     class="metric"
     x="56"
     y="1082"
     id="text38">=&gt; pipeline plus stable</text>
  <rect
     class="card"
     x="584"
     y="910"
     width="500"
     height="240"
     rx="18"
     id="rect38" />
  <rect
     class="purple"
     x="602"
     y="928"
     width="254"
     height="34"
     rx="12"
     id="rect39" />
  <text
     class="chipText"
     x="628"
     y="950"
     id="text39">Sortie navigateur</text>
  <text
     class="cardTitle"
     x="592.54395"
     y="990"
     id="text40"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Deux voies d’affichage</text>
  <text
     class="body"
     x="592.54395"
     y="1022"
     id="text41"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif"><tspan
       sodipodi:role="line"
       id="tspan57"
       x="592.54395"
       y="1022">• <tspan
   class="cardTitle"
   id="tspan40"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">WebCodecs</tspan> : paquets H.264 envoyés au navigateur,décodés nativement</tspan></text>
  <text
     class="body"
     x="592.54395"
     y="1052.8032"
     id="text42"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• <tspan
   class="cardTitle"
   id="tspan41"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">MJPEG</tspan> : fallback, utilisé seulement si WebCodecs n’est pas actif</text>
  <text
     class="metric"
     x="592.54395"
     y="1082"
     id="text43"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:16px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">=&gt; priorité au chemin le plus léger</text>
  <rect
     class="card"
     x="36"
     y="1180"
     width="1050.9835"
     height="315.24719"
     rx="18"
     id="rect43" />
  <text
     class="section"
     x="58"
     y="1212"
     id="text44">Pourquoi tout garder sur le GPU ?</text>
  <text
     class="body"
     x="58"
     y="1244"
     id="text45">• moins d’allers-retours CPU ↔ GPU</text>
  <text
     class="body"
     x="58"
     y="1268"
     id="text46">• moins d’allocations mémoire intermédiaires</text>
  <text
     class="body"
     x="58"
     y="1292"
     id="text47">• latence plus faible et plus stable</text>
  <text
     class="body"
     x="58"
     y="1316"
     id="text48">• meilleure capacité à tenir un flux 4K en direct</text>
  <text
     class="body"
     x="58"
     y="1356"
     id="text49"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Version simplifiée :</text>
  <text
     class="small"
     x="58"
     y="1380"
     id="text50">pipeline CPU = beaucoup de copies et de conversions ; pipeline GPU = moins d’étapes coûteuses, donc plus rapide.</text>
  <rect
     class="gray"
     x="56"
     y="1514"
     width="14"
     height="14"
     rx="4"
     id="rectLegend21" />
  <text
     class="small"
     x="76"
     y="1526"
     id="textLegend21">runtime / buffer</text>
  <rect
     class="accent"
     x="224"
     y="1514"
     width="14"
     height="14"
     rx="4"
     id="rectLegend22" />
  <text
     class="small"
     x="244"
     y="1526"
     id="textLegend22">source / caméra</text>
  <rect
     class="accent2"
     x="392"
     y="1514"
     width="14"
     height="14"
     rx="4"
     id="rectLegend23" />
  <text
     class="small"
     x="412"
     y="1526"
     id="textLegend23">GPU / preprocess</text>
  <rect
     class="orange"
     x="584"
     y="1514"
     width="14"
     height="14"
     rx="4"
     id="rectLegend24" />
  <text
     class="small"
     x="604"
     y="1526"
     id="textLegend24">IA / TensorRT</text>
  <rect
     class="purple"
     x="752"
     y="1514"
     width="14"
     height="14"
     rx="4"
     id="rectLegend25" />
  <text
     class="small"
     x="772"
     y="1526"
     id="textLegend25">navigateur / UI</text>
</svg>
