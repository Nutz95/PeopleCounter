<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="297mm" height="420mm" viewBox="0 0 1122.5197 1587.4016" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg{fill:#f6f9fc;}.header{fill:#1770b8;}.title{font:700 34px 'Microsoft Sans Serif', Arial, sans-serif;fill:#fff;}.subtitle{font:400 17px 'Microsoft Sans Serif', Arial, sans-serif;fill:#eaf4ff;}.section{font:700 20px 'Microsoft Sans Serif', Arial, sans-serif;fill:#0e2d47;}.body{font:400 14px 'Microsoft Sans Serif', Arial, sans-serif;fill:#12324d;}.small{font:400 12px 'Microsoft Sans Serif', Arial, sans-serif;fill:#234760;}.card{fill:#fff;stroke:#c8d9ea;stroke-width:1.4;rx:16;}.accent{fill:#1770b8;}.accent2{fill:#00a0d2;}.green{fill:#17a673;}.orange{fill:#f28c28;}.purple{fill:#7c5cff;}.yellow{fill:#eab308;}.chipText{font:700 13px 'Microsoft Sans Serif', Arial, sans-serif;fill:#fff;}.cardTitle{font:700 18px 'Microsoft Sans Serif', Arial, sans-serif;fill:#0e2d47;}.metric{font:700 16px 'Microsoft Sans Serif', Arial, sans-serif;fill:#1770b8;}.footer{font:400 11px 'Microsoft Sans Serif', Arial, sans-serif;fill:#6d8196;}.line{stroke:#1770b8;stroke-width:3;fill:none;}.tileA{fill:#dff4fb;stroke:#00a0d2;stroke-width:2;}.tileB{fill:#fff0df;stroke:#f28c28;stroke-width:2;}.overlap{fill:#fff4b8;stroke:#eab308;stroke-width:2;}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1122.5197" height="1587.4016"/>
  <rect class="header" x="0" y="0" width="1122.5197" height="146"/>
  <text class="title" x="48" y="58">PeopleCounter — Poster Tiling</text>
  <text class="title" x="48" y="97">Pourquoi le tiling change tout</text>
  <text class="subtitle" x="50" y="126">Poster A3 harmonisé : workflow de tuiles 4K, overlap réel, et différence entre tiling et letterbox.</text>

  <rect class="card" x="36" y="176" width="1050" height="160" rx="18"/>
  <text class="section" x="58" y="208">Message central</text>
  <text class="body" x="58" y="238">Une image 4K redimensionnée globalement en 640×640 perd énormément de détail. Le tiling découpe la scène en crops carrés pour conserver plus de résolution locale.</text>
  <rect class="accent" x="62" y="266" width="180" height="36" rx="12"/><text class="chipText" x="89" y="289">Source : 3840×2160</text>
  <rect class="accent2" x="260" y="266" width="198" height="36" rx="12"/><text class="chipText" x="287" y="289">Crops chevauchants</text>
  <rect class="green" x="476" y="266" width="186" height="36" rx="12"/><text class="chipText" x="503" y="289">Resize vers 640×640</text>
  <rect class="orange" x="680" y="266" width="196" height="36" rx="12"/><text class="chipText" x="707" y="289">Pas de padding noir</text>

  <rect class="card" x="36" y="366" width="1050" height="430" rx="18"/>
  <text class="section" x="58" y="398">1. Workflow du tiling</text>
  <rect class="accent" x="68" y="440" width="180" height="40" rx="12"/><text class="chipText" x="95" y="466">Frame 4K réelle</text>
  <rect x="74" y="500" width="250" height="145" fill="#dbeafe" stroke="#1770b8" stroke-width="2" rx="12"/>
  <text class="small" x="150" y="578">3840 × 2160</text>
  <text class="body" x="360" y="530">→</text>
  <rect class="accent2" x="404" y="440" width="290" height="40" rx="12"/><text class="chipText" x="430" y="466">Canevas virtuel de planification</text>
  <rect x="424" y="500" width="250" height="145" fill="#eef8fc" stroke="#00a0d2" stroke-width="2" rx="12"/>
  <text class="small" x="494" y="578">1920 × 1080</text>
  <text class="small" x="442" y="608">Utilisé pour calculer la grille, pas pour fabriquer une vraie image intermédiaire.</text>
  <text class="body" x="710" y="530">→</text>
  <rect class="green" x="748" y="440" width="240" height="40" rx="12"/><text class="chipText" x="768" y="466">Batch de 8 tuiles (4×2)</text>
  <rect x="758" y="500" width="48" height="48" class="tileA" rx="8"/>
  <rect x="816" y="500" width="48" height="48" class="tileB" rx="8"/>
  <rect x="874" y="500" width="48" height="48" class="tileA" rx="8"/>
  <rect x="932" y="500" width="48" height="48" class="tileB" rx="8"/>
  <rect x="758" y="558" width="48" height="48" class="tileB" rx="8"/>
  <rect x="816" y="558" width="48" height="48" class="tileA" rx="8"/>
  <rect x="874" y="558" width="48" height="48" class="tileB" rx="8"/>
  <rect x="932" y="558" width="48" height="48" class="tileA" rx="8"/>
  <text class="small" x="776" y="692">Chaque crop réel 1280×1280 est redimensionné en 640×640 pour l’inférence.</text>
  <text class="metric" x="58" y="748">Le point clé : tiling = crop + resize, pas letterbox.</text>

  <rect class="card" x="36" y="826" width="1050" height="330" rx="18"/>
  <text class="section" x="58" y="858">2. L’overlap réel n’est pas toujours exactement 20%</text>
  <text class="body" x="58" y="888">Dans la configuration actuelle, l’overlap nominal est de 20%, mais il augmente sur les bords parce que la dernière tuile est clampée contre le bord de l’image.</text>
  <rect x="84" y="930" width="380" height="130" fill="#eef6fb" stroke="#c8d9ea" stroke-width="2" rx="12"/>
  <rect x="124" y="960" width="128" height="88" class="tileA" rx="8"/>
  <rect x="226" y="960" width="128" height="88" class="tileB" rx="8"/>
  <rect x="226" y="960" width="26" height="88" class="overlap" rx="4"/>
  <text class="small" x="126" y="1084">Premier overlap horizontal : 256 px en 4K = 20%</text>
  <rect x="566" y="930" width="430" height="130" fill="#eef6fb" stroke="#c8d9ea" stroke-width="2" rx="12"/>
  <rect x="606" y="960" width="128" height="88" class="tileA" rx="8"/>
  <rect x="720" y="960" width="128" height="88" class="tileB" rx="8"/>
  <rect x="806" y="960" width="128" height="88" class="tileA" rx="8"/>
  <rect x="806" y="960" width="42" height="88" class="overlap" rx="4"/>
  <text class="small" x="608" y="1084">Sur la dernière colonne, l’overlap grandit car la tuile finale est recollée au bord.</text>

  <rect class="card" x="36" y="1186" width="1050" height="260" rx="18"/>
  <text class="section" x="58" y="1218">3. Tiling vs letterbox</text>
  <rect class="green" x="68" y="1252" width="200" height="36" rx="12"/><text class="chipText" x="97" y="1275">Mode tiling</text>
  <rect x="68" y="1306" width="420" height="92" fill="#eaf9f3" stroke="#17a673" stroke-width="2" rx="10"/>
  <text class="body" x="88" y="1344">• crop réel dans l’image</text>
  <text class="body" x="88" y="1368">• resize vers 640×640</text>
  <text class="body" x="88" y="1392">• aucune bande noire</text>
  <rect class="orange" x="604" y="1252" width="216" height="36" rx="12"/><text class="chipText" x="632" y="1275">Mode global letterbox</text>
  <rect x="604" y="1306" width="420" height="92" fill="#fff3e9" stroke="#f28c28" stroke-width="2" rx="10"/>
  <text class="body" x="624" y="1344">• resize plein cadre</text>
  <text class="body" x="624" y="1368">• padding pour garder le ratio</text>
  <text class="body" x="624" y="1392">• bandes noires possibles</text>

  <rect class="card" x="36" y="1466" width="1050" height="76" rx="18"/>
  <text class="body" x="58" y="1500">À raconter au public : <tspan class="cardTitle">le tiling ne fait pas “juste plus de calcul”</tspan> — il conserve surtout plus de résolution utile sur les personnes petites ou lointaines.</text>
  <text class="footer" x="38" y="1560">Poster A3 harmonisé · refonte du poster `assets/poster_tiling_expo_a3_fr.svg` dans la charte des panneaux expo.</text>
</svg>
