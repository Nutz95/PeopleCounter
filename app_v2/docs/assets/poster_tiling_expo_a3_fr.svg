  <title
     id="title">Poster expo A3 portrait — Tiling PeopleCounter</title>
  <desc
     id="desc">Poster d’exposition en français au format A3 portrait regroupant deux infographies : workflow de tiling 4K et overlap versus letterbox.</desc>
  <defs
     id="defs1">
    <style
       id="style1">
      .bg { fill: #08111f; }
      .card { fill: #0f172a; stroke: #334155; stroke-width: 6; rx: 36; }
      .panel { fill: #111827; stroke: #475569; stroke-width: 4; rx: 28; }
      .title { font: 700 122px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 600 46px Arial, sans-serif; fill: #cbd5e1; }
      .section { font: 700 62px Arial, sans-serif; fill: #e2e8f0; }
      .body { font: 36px Arial, sans-serif; fill: #cbd5e1; }
      .bodyStrong { font: 700 36px Arial, sans-serif; fill: #f8fafc; }
      .chip { fill: #1d4ed8; }
      .chipText { font: 700 32px Arial, sans-serif; fill: #eff6ff; }
      .accent { fill: #fdba74; }
      .footer { font: 32px Arial, sans-serif; fill: #94a3b8; }
      .bullet { fill: #38bdf8; }
      .separator { stroke: #334155; stroke-width: 4; }
    </style>
  </defs>
  <rect
     class="bg"
     x="0"
     y="0"
     width="2970"
     height="4200"
     id="rect1" />
  <rect
     class="card"
     x="90"
     y="90"
     width="2790"
     height="4020"
     rx="36"
     id="rect2" />
  <text
     class="title"
     x="180"
     y="260"
     id="text2">PeopleCounter — Tiling 4K</text>
  <text
     class="subtitle"
     x="180"
     y="335"
     id="text3"
     style="font-style:normal;font-variant:normal;font-weight:600;font-stretch:normal;font-size:46px;line-height:normal;font-family:Arial, sans-serif">géométrie réelle du pipeline</text>
  <text
     class="section"
     x="180"
     y="460"
     id="text5">1. Comment la frame 4K est découpée</text>
  <text
     class="body"
     x="180"
     y="520"
     id="text6">Le canevas 1920×1080 sert uniquement à calculer la grille de tuiles. Les crops sont ensuite pris directement dans la vraie image 4K.</text>
  <image
     href="tiling_crowd_tiles_workflow_fr.svg"
     x="38.394882"
     y="553.00641"
     width="2893.21"
     height="1565.7373"
     preserveAspectRatio="xMidYMid"
     id="image6" />
  <line
     class="separator"
     x1="170"
     y1="2160"
     x2="2800"
     y2="2160"
     id="line6" />
  <text
     class="section"
     x="180"
     y="2280"
     id="text7">2. Overlap réel et bandes noires</text>
  <text
     class="body"
     x="180"
     y="2340"
     id="text8">L’overlap nominal est de 20%, mais il augmente sur la dernière colonne / ligne à cause du clamping au bord. Les bandes noires n’existent qu’en letterbox.</text>
  <image
     href="tiling_overlap_vs_letterbox_fr.svg"
     x="90.886238"
     y="2374.488"
     width="2788.2275"
     height="1519.8574"
     preserveAspectRatio="xMidYMid"
     id="image8" />
  <text
     class="section"
     x="180"
     y="3932.3743"
     id="text9"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:62px;line-height:normal;font-family:Arial, sans-serif">3. Messages clés à retenir</text>
  <g
     id="g18"
     transform="translate(-79.375004)">
    <circle
       class="bullet"
       cx="220"
       cy="3997.3743"
       r="11"
       id="circle9" />
    <text
       class="bodyStrong"
       x="255"
       y="4012.3743"
       id="text10"
       style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">Pas d’image 1080p intermédiaire réelle :</text>
    <text
       class="body"
       x="945.87506"
       y="4012.3743"
       id="text11"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">le 1920×1080 est un espace virtuel de planification.</text>
    <circle
       class="bullet"
       cx="220"
       cy="4062.3748"
       r="11"
       id="circle11" />
    <text
       class="bodyStrong"
       x="255"
       y="4077.3755"
       id="text12"
       style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">Pas de bandes noires en tiling :</text>
    <text
       class="body"
       x="807.3335"
       y="4077.3755"
       id="text13"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">tiling = crop + resize, alors que le letterbox ajoute du padding.</text>
  </g>
  <g
     id="g20">
    <circle
       class="bullet"
       cx="1746.9581"
       cy="3997.3743"
       r="11"
       id="circle13" />
    <text
       class="bodyStrong"
       x="1781.9581"
       y="4012.3743"
       id="text14"
       style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">Sur la config actuelle crowd_tiles :</text>
    <text
       class="body"
       x="2394.9575"
       y="4012.3743"
       id="text15"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">8 tuiles sur une image 4K.</text>
  </g>
  <g
     id="g19">
    <circle
       class="bullet"
       cx="1746.9581"
       cy="4062.3748"
       r="11"
       id="circle15" />
    <text
       class="bodyStrong"
       x="1781.9581"
       y="4077.3755"
       id="text16"
       style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">L’overlap de 20% est nominal :</text>
    <text
       class="body"
       x="2323.7905"
       y="4077.3755"
       id="text17"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:36px;line-height:normal;font-family:Arial, sans-serif">aux bords, il peut être plus grand.</text>
  </g>
</svg>
