  <title
     id="title">Workflow du tiling crowd : frame 4K vers canevas virtuel de planification puis entrées tuiles 640 par 640</title>
  <desc
     id="desc">Infographie montrant que le tiling crowd utilise un espace de planification virtuel 1920 par 1080, reprojette des crops carrés sur la source 4K, puis redimensionne chaque crop en 640 par 640 sans bandes noires.</desc>
