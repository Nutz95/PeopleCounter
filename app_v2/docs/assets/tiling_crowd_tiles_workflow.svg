  <title
     id="title">Crowd tiles workflow: 4K frame to virtual planning canvas to 640 by 640 tile inputs</title>
  <desc
     id="desc">Infographic showing that crowd tiling uses a virtual 1920 by 1080 planning space, maps square crops back to the 4K source, and resizes each crop to 640 by 640 without black bars.</desc>
  <defs
     id="defs1">
    <style
       id="style1">
      .bg { fill: #0b1220; }
      .card { fill: #111827; stroke: #334155; stroke-width: 2; rx: 18; }
      .panel { fill: #0f172a; stroke: #475569; stroke-width: 2; rx: 14; }
      .frame { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .virtual { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
      .crop { fill: rgba(249,115,22,0.16); stroke: #f97316; stroke-width: 3; }
      .tile { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .note { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .title { font: 700 28px Arial, sans-serif; fill: #e5e7eb; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 600 16px Arial, sans-serif; fill: #e5e7eb; }
      .small { font: 14px Arial, sans-serif; fill: #cbd5e1; }
