   id="tspan1">crowd_tiles</tspan> on a 4K frame</text>
  <text
     class="subtitle"
     x="50"
     y="82"
     id="text2">Important: the 1920×1080 stage is a virtual planning canvas only — the code does not materialize an intermediate 1080p image for tiling.</text>
