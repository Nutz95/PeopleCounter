     inkscape:window-maximized="1"
     inkscape:current-layer="svg37" />
  <title
     id="title">Comportement de l’overlap en tiling et bandes noires en letterbox</title>
  <desc
     id="desc">Infographie comparant l’overlap du plan de tuiles crowd avec la présence de bandes noires dans les modes globaux en letterbox et leur absence en mode tiling.</desc>
  <defs
     id="defs1">
    <style
       id="style1">
      .bg { fill: #0b1220; }
      .card { fill: #111827; stroke: #334155; stroke-width: 2; rx: 18; }
      .panel { fill: #0f172a; stroke: #475569; stroke-width: 2; rx: 12; }
      .title { font: 700 28px Arial, sans-serif; fill: #e5e7eb; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 600 18px Arial, sans-serif; fill: #e5e7eb; }
      .small { font: 14px Arial, sans-serif; fill: #cbd5e1; }
      .tiny { font: 12px Arial, sans-serif; fill: #cbd5e1; }
      .dark { fill: #111827; }
      .frame { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .tileA { fill: rgba(14,165,233,0.18); stroke: #0ea5e9; stroke-width: 3; }
      .tileB { fill: rgba(249,115,22,0.18); stroke: #f97316; stroke-width: 3; }
      .overlap { fill: rgba(234,179,8,0.35); stroke: #eab308; stroke-width: 2; }
      .good { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 12; }
      .warn { fill: #fef3c7; stroke: #f59e0b; stroke-width: 2; rx: 12; }
      .bad { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; rx: 12; }
      .blackbar { fill: #020617; }
      .img { fill: #c7d2fe; }
    </style>
  </defs>
  <rect
     class="bg"
     x="0"
     y="0"
     width="1500"
     height="920"
     id="rect1" />
  <text
     class="title"
     x="50"
     y="50"
     id="text1">Overlap et bandes noires — ce qui se passe vraiment dans le pipeline actuel</text>
  <text
     class="subtitle"
     x="50"
     y="82"
     id="text2">Le tiling utilise des crops réels puis un resize. Le letterbox utilise un resize plein cadre puis du padding. Ce n’est pas la même opération.</text>
  <rect
     class="card"
     x="40"
     y="120"
     width="690"
     height="340"
     rx="18"
     id="rect2" />
  <text
     class="label"
     x="65"
     y="160"
     id="text3">A. Overlap horizontal dans la config actuelle <tspan
   fill="#fdba74"
   id="tspan2">crowd_tiles</tspan></text>
  <text
     class="small"
     x="65"
     y="183"
     id="text4"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif"><tspan
       sodipodi:role="line"
       id="tspan1"
       x="65"
       y="183">Largeur d’un crop 4K = 1280 px, pas nominal = 1024 px,</tspan><tspan
       sodipodi:role="line"
       id="tspan3"
       x="65"
       y="200.5">Donc les premiers overlaps valent exactement 256 px = 20%</tspan></text>
  <rect
     class="panel"
     x="70"
     y="215"
     width="620"
     height="180"
     rx="12"
     id="rect4" />
  <rect
     class="tileA"
     x="110"
     y="255"
     width="180"
     height="120"
     id="rect5" />
  <rect
     class="tileB"
     x="254"
     y="255"
     width="180"
     height="120"
     id="rect6" />
  <rect
     class="overlap"
     x="254"
     y="255"
     width="36"
     height="120"
     id="rect7" />
  <text
     class="tiny"
     x="150"
     y="245"
     id="text7">tuile 0</text>
  <text
     class="tiny"
     x="305"
     y="245"
     id="text8">tuile 1</text>
  <text
     class="small"
     x="330"
     y="325"
     id="text9"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">overlap = 256 px en 4K</text>
  <text
     class="small"
     x="330"
     y="347"
     id="text10"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">= 128 px dans l’espace virtuel 1920×1080</text>
  <rect
     class="warn"
     x="44.823139"
     y="409.80652"
     width="680.3537"
     height="35.38694"
     id="rect10" />
  <text
     class="small dark"
     x="49.215332"
     y="433"
     id="text11"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">Au bord droit, la dernière tuile est clampée à x = 2560, donc l’overlap final devient plus grand : 768 px en 4K.</text>
  <rect
     class="card"
     x="770"
     y="120"
     width="690"
     height="340"
     rx="18"
     id="rect11" />
  <text
     class="label"
     x="795"
     y="160"
     id="text12">B. L’overlap vertical n’est pas exactement de 20% sur la dernière ligne</text>
  <text
     class="small"
     x="795"
     y="187"
     id="text13">Comme la ligne du bas est clampée sur le bord inférieur de l’image, l’overlap dépasse le pas nominal</text>
  <rect
     class="panel"
     x="800"
     y="215"
     width="620"
     height="180"
     rx="12"
     id="rect13" />
  <rect
     class="tileA"
     x="1015"
     y="230"
     width="140"
     height="140"
     id="rect14" />
  <rect
     class="tileB"
     x="1015"
     y="326"
     width="140"
     height="140"
     id="rect15" />
  <rect
     class="overlap"
     x="1015"
     y="326"
     width="140"
     height="44"
     id="rect16" />
  <text
     class="tiny"
     x="1170"
     y="300"
     id="text16">ligne 0</text>
  <text
     class="tiny"
     x="1170"
     y="395"
     id="text17">ligne 1</text>
  <text
     class="small"
     x="1210"
     y="318"
     id="text18">hauteur du crop = 1280 px</text>
  <text
     class="small"
     x="1210"
     y="340"
     id="text19">départs des lignes = 0 et 880 px</text>
  <text
     class="small"
     x="1210"
     y="362"
     id="text20">overlap vertical = 400 px</text>
  <text
     class="small"
     x="1210"
     y="384"
     id="text21">≈ 31,25% en 4K</text>
  <rect
     class="warn"
     x="800"
     y="410"
     width="620"
     height="35"
     id="rect21" />
  <text
     class="small dark"
     x="1113.0698"
     y="423"
     id="text22"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif;text-align:center;text-anchor:middle"><tspan
       sodipodi:role="line"
       id="tspan38"
       x="1113.0698"
       y="423"><tspan
   style="font-weight:bold;text-align:center;text-anchor:middle"
   id="tspan37">Conclusion :</tspan> l’overlap configuré décrit le pas nominal de la grille, mais l’overlap effectif augmente</tspan><tspan
       sodipodi:role="line"
       id="tspan39"
       x="1113.0698"
       y="440.5">sur la dernière colonne / la dernière ligne à cause du clamping sur les bords.</tspan></text>
  <rect
     class="card"
     x="40"
     y="500"
     width="690"
     height="360"
     rx="18"
     id="rect22" />
  <text
     class="label"
     x="65"
     y="540"
     id="text23">C. En mode tiling : pas de bandes noires</text>
  <text
     class="small"
     x="65"
     y="567"
     id="text24">Le kernel croppe une vraie zone carrée de l’image source puis la redimensionne en 640×640.</text>
  <rect
     class="panel"
     x="105"
     y="600"
     width="250"
     height="190"
     rx="12"
     id="rect24" />
  <g
     id="g6">
    <g
       id="g3">
      <rect
         class="img"
         x="145"
         y="630"
         width="170"
         height="120"
         id="rect25" />
      <rect
         class="tileA"
         x="170"
         y="630"
         width="120"
         height="120"
         id="rect26" />
    </g>
    <text
       class="small"
       x="161.53809"
       y="778"
       id="text26"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">crop réel dans l’image</text>
  </g>
  <rect
     class="panel"
     x="415"
     y="600"
     width="250"
     height="190"
     rx="12"
     id="rect27" />
  <g
     id="g5"
     transform="translate(0,-10.835449)">
    <rect
       class="tileA"
       x="480"
       y="635"
       width="120"
       height="120"
       id="rect28" />
    <text
       class="small"
       x="454.84131"
       y="778"
       id="text28"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">redimensionné en 640×640</text>
  </g>
  <g
     id="g41"
     transform="translate(25)">
    <rect
       class="good"
       x="80"
       y="812"
       width="560"
       height="30"
       id="rect29" />
    <text
       class="small dark"
       x="125"
       y="833"
       id="text29"
       style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">Pas de masque letterbox, pas de padding noir : tiling = crop + resize uniquement.</text>
  </g>
  <rect
     class="card"
     x="770"
     y="500"
     width="690"
     height="360"
     rx="18"
     id="rect30" />
  <text
     class="label"
     x="795"
     y="540"
     id="text30">D. En mode global letterbox : les bandes noires sont ajoutées ici</text>
  <text
     class="small"
     x="795"
     y="567"
     id="text31">C’est le cas dans `yolo_global`, `crowd_global` et les pipelines de resize global côté density — pas en tiling.</text>
  <g
     id="g49"
     transform="translate(25)">
    <g
       id="g46">
      <rect
         class="panel"
         x="810"
         y="600"
         width="250"
         height="190"
         rx="12"
         id="rect31" />
      <rect
         class="img"
         x="840"
         y="640"
         width="190"
         height="106.875"
         id="rect32" />
      <text
         class="small"
         x="835.84131"
         y="778"
         id="text32"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">frame 16:9 avant cible carrée</text>
    </g>
    <g
       id="g48">
      <rect
         class="panel"
         x="1120"
         y="600"
         width="250"
         height="190"
         rx="12"
         id="rect33" />
      <g
         id="g47">
        <rect
           class="blackbar"
           x="1185"
           y="635"
           width="120"
           height="18"
           id="rect34" />
        <rect
           class="img"
           x="1185"
           y="653"
           width="120"
           height="67.5"
           id="rect35" />
        <rect
           class="blackbar"
           x="1185"
           y="720.5"
           width="120"
           height="18"
           id="rect36" />
      </g>
      <text
         class="small"
         x="1148"
         y="778"
         id="text36"
         style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif">cible carrée avec padding</text>
    </g>
  </g>
  <rect
     class="bad"
     x="781.22522"
     y="812.23517"
     width="667.54956"
     height="38.396923"
     id="rect37" />
  <text
     class="small dark"
     x="1115.4443"
     y="826.22125"
     id="text37"
     style="font-style:normal;font-variant:normal;font-weight:normal;font-stretch:normal;font-size:14px;line-height:normal;font-family:Arial, sans-serif;text-align:center;text-anchor:middle"><tspan
       sodipodi:role="line"
       id="tspan40"
       x="1115.4443"
       y="826.22125">Les bandes noires appartiennent uniquement aux modes letterbox.</tspan><tspan
       sodipodi:role="line"
       id="tspan41"
       x="1115.4443"
       y="843.72125">Elles sont normales quand on conserve le ratio dans une entrée carrée fixe.</tspan></text>
</svg>
