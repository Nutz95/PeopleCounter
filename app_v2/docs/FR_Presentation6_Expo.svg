  <text
     class="title"
     x="48"
     y="58"
     id="text2">PeopleCounter — Panneau 6</text>
  <text
     class="title"
     x="48"
     y="97"
     id="text3">Modèles, architecture et open source</text>
  <text
     class="subtitle"
     x="50"
     y="126"
     id="text4">Le “catalogue” des briques métiers du projet : quels modèles, quelle architecture logicielle, et sur quels composants il s’appuie.</text>
  <rect
     class="card"
     x="36"
     y="180"
     width="1050"
     height="340"
     rx="18"
     id="rect4" />
  <text
     class="section"
     x="58"
     y="212"
     id="text5">Le zoo de modèles</text>
  <rect
     class="accent"
     x="60"
     y="242"
     width="220"
     height="34"
     rx="12"
     id="rect5" />
  <text
     class="chipText"
     x="147.5166"
     y="262.36743"
     id="text6"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">yolo26x</text>
  <text
     class="body"
     x="64"
     y="300"
     id="text7">• Architecture : CSPDarknet + neck</text>
  <text
     class="body"
     x="64"
     y="324"
     id="text8">• Décodeur : YOLOv8</text>
  <text
     class="body"
     x="64"
     y="348"
     id="text9">• Tâche : détection + segmentation</text>
  <text
     class="body"
     x="64"
     y="372"
     id="text10">• Moteur : FP8-QDQ `.engine`</text>
  <rect
     class="accent2"
     x="322"
     y="242"
     width="220"
     height="34"
     rx="12"
     id="rect10" />
  <text
     class="chipText"
     x="409.53564"
     y="262.36743"
     id="text11"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">yolo26n</text>
  <text
     class="body"
     x="326"
     y="300"
     id="text12">• Architecture : version nano</text>
  <text
     class="body"
     x="326"
     y="324"
     id="text13">• Décodeur : YOLOv8</text>
  <text
     class="body"
     x="326"
     y="348"
     id="text14">• Tâche : détection rapide</text>
  <text
     class="body"
     x="326"
     y="372"
     id="text15">• Moteur : FP8-QDQ `.engine`</text>
  <rect
     class="green"
     x="584"
     y="242"
     width="220"
     height="34"
     rx="12"
     id="rect15" />
  <text
     class="chipText"
     x="648.79517"
     y="263.65283"
     id="text16"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">YOLO-CROWD</text>
  <text
     class="body"
     x="588"
     y="300"
     id="text17">• Architecture : YOLOv5 nc=1 + tête P2/4</text>
  <text
     class="body"
     x="588"
     y="324"
     id="text18">• Décodeur : YOLOv5</text>
  <text
     class="body"
     x="588"
     y="348"
     id="text19">• Tâche : détection de foule / têtes</text>
  <text
     class="body"
     x="588"
     y="372"
     id="text20">• Moteur : FP16 `.engine`</text>
  <rect
     class="orange"
     x="846"
     y="242"
     width="220"
     height="34"
     rx="12"
     id="rect20" />
  <text
     class="chipText"
     x="906.03125"
     y="263.36084"
     id="text21"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">DM-Count QNRF</text>
  <text
     class="body"
     x="850"
     y="300"
     id="text22">• Backbone : VGG16</text>
  <text
     class="body"
     x="850"
     y="324"
     id="text23">• Décodeur : spécifique densité</text>
  <text
     class="body"
     x="850"
     y="348"
     id="text24">• Tâche : crowd counting</text>
  <text
     class="body"
     x="850"
     y="372"
     id="text25">• Moteur : FP16 `.engine`</text>
  <text
     class="body"
     x="58"
     y="460"
     id="text26"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Message important :</text>
  <text
     class="small"
     x="58"
     y="486"
     id="text27"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:12px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">dans le projet, “YOLOv8” décrit surtout le format du décodeur TensorRT, pas forcément le nom exact des poids entraînés.</text>
  <text
     class="small"
     x="58"
     y="508"
     id="text28"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:12px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Les moteurs sont compilés à partir d’exports ONNX et sont spécifiques au matériel cible.</text>
  <rect
     class="card"
     x="36"
     y="552"
     width="1050"
     height="280"
     rx="18"
     id="rect28" />
  <text
     class="section"
     x="58"
     y="584"
     id="text29">Architecture logicielle</text>
  <rect
     class="accent"
     x="64"
     y="618"
     width="220"
     height="40"
     rx="12"
     id="rect29" />
  <text
     class="chipText"
     x="161.35547"
     y="641.36426"
     id="text30"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">core</text>
  <text
     class="small"
     x="64"
     y="680"
     id="text31">Interfaces abstraites :</text>
  <text
     class="small"
     x="64"
     y="702"
     id="text32"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:12px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif"><tspan
       sodipodi:role="line"
       id="tspan61"
       x="64"
       y="702">FrameSource, InferenceModel</tspan><tspan
       sodipodi:role="line"
       id="tspan62"
       x="64"
       y="717">ResultPublisher…</tspan></text>
  <rect
     class="accent2"
     x="318"
     y="618"
     width="220"
     height="40"
     rx="12"
     id="rect32" />
  <text
     class="chipText"
     x="396.98853"
     y="641.35791"
     id="text33"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">application</text>
  <text
     class="small"
     x="318"
     y="680"
     id="text34">Orchestration :</text>
  <text
     class="small"
     x="318"
     y="702"
     id="text35">PipelineOrchestrator, FrameScheduler…</text>
  <rect
     class="green"
     x="572"
     y="618"
     width="220"
     height="40"
     rx="12"
     id="rect35" />
  <text
     class="chipText"
     x="643.81885"
     y="642.65283"
     id="text36"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">infrastructure</text>
  <text
     class="small"
     x="572"
     y="680"
     id="text37">Implémentations concrètes :</text>
  <text
     class="small"
     x="572"
     y="702"
     id="text38">NVDEC, TensorRT, Flask, WebCodecs…</text>
  <rect
     class="orange"
     x="826"
     y="618"
     width="220"
     height="40"
     rx="12"
     id="rect38" />
  <text
     class="chipText"
     x="914.82104"
     y="642.57349"
     id="text39"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">kernels</text>
  <text
     class="small"
     x="826"
     y="680"
     id="text40">Noyaux CUDA :</text>
  <text
     class="small"
     x="826"
     y="702"
     id="text41">NV12 bridge, letterbox, tiling…</text>
  <text
     class="body"
     x="58"
     y="760"
     id="text42">Pourquoi c’est intéressant pour une démo :</text>
  <text
     class="body"
     x="58"
     y="786"
     id="text43">• le projet n’est pas un script monolithique : il suit une architecture propre et testable ;</text>
  <text
     class="body"
     x="58"
     y="810"
     id="text44">• les interfaces du cœur restent découplées des implémentations GPU et web.</text>
  <rect
     class="card"
     x="36"
     y="864"
     width="1050"
     height="360"
     rx="18"
     id="rect44" />
  <text
     class="section"
     x="58"
     y="896"
     id="text45">Composants open source et dépendances majeures</text>
  <text
     class="body"
     x="58"
     y="928"
     id="text46">• PyTorch — export / travail sur les modèles</text>
  <text
     class="body"
     x="58"
     y="952"
     id="text47">• Ultralytics YOLOv8 — architecture et écosystème de détection</text>
  <text
     class="body"
     x="58"
     y="976"
     id="text48">• OpenCV — traitement d’image</text>
  <text
     class="body"
     x="58"
     y="1000"
     id="text49">• Flask — serveur web / API</text>
  <text
     class="body"
     x="58"
     y="1024"
     id="text50">• TensorRT — moteur d’inférence NVIDIA</text>
  <text
     class="body"
     x="58"
     y="1048"
     id="text51">• CUDA / NVDEC — calcul GPU et décodage vidéo</text>
  <text
     class="body"
     x="58"
     y="1072"
     id="text52">• DM-Count — estimation de densité</text>
  <text
     class="body"
     x="58"
     y="1096"
     id="text53">• YOLO-CROWD — détection spécialisée foule</text>
  <text
     class="small"
     x="58"
     y="1200"
     id="text54"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:12px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Ce panneau montre que le projet réutilise des briques connues, mais les assemble dans une chaîne cohérente et spécifique à la démo.</text>
  <rect
     class="card"
     x="36"
     y="1256"
     width="1050"
     height="254"
     rx="18"
     id="rect54" />
  <text
     class="section"
     x="58"
     y="1288"
     id="text55">Messages clés à retenir</text>
  <text
     class="body"
     x="58"
     y="1320"
     id="text56">1. Chaque modèle a un rôle précis : détection globale, tiling, comptage dense, ou foule spécialisée.</text>
  <text
     class="body"
     x="58"
     y="1344"
     id="text57">2. Les moteurs TensorRT compilés sont adaptés au matériel de démo.</text>
  <text
     class="body"
     x="58"
     y="1368"
     id="text58">3. L’architecture du code est organisée en couches, ce qui facilite la maintenance et les tests.</text>
  <text
     class="body"
     x="58"
     y="1392"
     id="text59">4. PeopleCounter repose sur un mélange de briques open source et de technologies NVIDIA.</text>
  <text
     class="body"
     x="58"
     y="1416"
     id="text60">5. La valeur du projet vient aussi de l’intégration de toutes ces briques en temps réel sur une caméra 4K.</text>
</svg>
