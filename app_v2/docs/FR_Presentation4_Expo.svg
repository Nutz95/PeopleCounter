  <text
     class="body"
     x="62"
     y="906"
     id="text34">Density Map</text>
  <rect
     class="bar4"
     x="220"
     y="886"
     width="580"
     height="26"
     rx="10"
     id="rect34" />
  <text
     class="small"
     x="815"
     y="905"
     id="text35">22,9 ms</text>
  <text
     class="body"
     x="62"
     y="968"
     id="text36">YOLO-CROWD Tiling</text>
  <rect
     class="bar5"
     x="220"
     y="948"
     width="720"
     height="26"
     rx="10"
     id="rect36" />
  <text
     class="small"
     x="955"
     y="967"
     id="text37">20–30 ms</text>
  <text
     class="body"
     x="58"
     y="1014"
     id="text38"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">La 4K temps réel est tenue grâce au GPU, mais tous les modes n’ont pas le même coût.</text>
  <rect
     class="card"
     x="36"
     y="1037.261"
     width="1050"
     height="181.47792"
     rx="18"
     id="rect38" />
  <g
     id="g71"
     transform="translate(0,7.885742)">
    <text
       class="section"
       x="58"
       y="1062"
       id="text39"
       style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:20px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Pourquoi FP8-QDQ change la donne ?</text>
    <text
       class="body"
       x="58"
       y="1090"
       id="text40"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Le FP8-QDQ réduit fortement le coût mémoire et accélère l’inférence sur les GPU NVIDIA récents.</text>
    <text
       class="body"
       x="58"
       y="1120"
       id="text41"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• FP32 : référence</text>
    <text
       class="body"
       x="58"
       y="1144"
       id="text42"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• FP16 : déjà rapide</text>
    <text
       class="body"
       x="58"
       y="1168"
       id="text43"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• <tspan
   class="metric"
   id="tspan42"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">FP8-QDQ : ~ 3 à 4× plus rapide que la base</tspan></text>
    <text
       class="body"
       x="58"
       y="1192"
       id="text44"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">=&gt; intérêt principal : beaucoup de vitesse sans trop sacrifier la qualité sur YOLO.</text>
  </g>
  <g
     id="g72"
     transform="translate(0,-14)">
    <rect
       class="card"
       x="36"
       y="1270"
       width="1050"
       height="240"
       rx="18"
       id="rect44" />
    <text
       class="section"
       x="58"
       y="1302"
       id="text45"
       style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:20px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Messages clés à retenir</text>
    <text
       class="body"
       x="58"
       y="1334"
       id="text46"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">1. Le GPU prend en charge le décodage, le preprocess et l’inférence : c’est ce qui rend la 4K temps réel possible.</text>
    <text
       class="body"
       x="58"
       y="1358"
       id="text47"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">2. Les modes “tiling” coûtent plus cher, mais voient mieux les petites personnes.</text>
    <text
       class="body"
       x="58"
       y="1382"
       id="text48"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">3. La density map est plus lente qu’un détecteur global, mais reste utile dans les foules très serrées.</text>
    <text
       class="body"
       x="58"
       y="1406"
       id="text49"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">4. FP8-QDQ permet d’accélérer fortement l’inférence sur les modèles YOLO.</text>
    <text
       class="body"
       x="58"
       y="1430"
       id="text50"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">5. Le mode de démonstration le plus “lisible” est souvent YOLO Global ou YOLO Tiling.</text>
  </g>
