       style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:13px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Docker · Ubuntu 24.04</text>
  </g>
  <text
     class="body"
     x="58"
     y="295"
     id="text11"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Bande passante mémoire élevée, décodage matériel NVDEC, et inférence TensorRT optimisée : c’est la combinaison qui permet de tenir la 4K en temps réel.</text>
  <rect
     class="card"
     x="36.259853"
     y="336.24124"
     width="1050"
     height="256.39026"
     rx="18"
     id="rect11" />
  <text
     class="section"
     x="58.259853"
     y="368.24124"
     id="text12"
     style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:20px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Latence bout en bout</text>
  <text
     class="body"
     x="58.259853"
     y="396.24124"
     id="text13"
     style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">La latence dépend du mode sélectionné, mais la structure reste toujours la même :</text>
  <g
     id="g67"
     transform="translate(0.25985219,-21.758758)">
    <text
       class="body"
       x="64"
       y="525"
       id="text18"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• Décodage NVDEC : <tspan
   class="metric"
   id="tspan17"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">~ 1 à 3 ms</tspan></text>
    <text
       class="body"
       x="64"
       y="549"
       id="text19"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• Preprocess GPU : <tspan
   class="metric"
   id="tspan18"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">~ 3 à 4 ms</tspan></text>
    <text
       class="body"
       x="64"
       y="573"
       id="text20"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• Décodage résultat + overlay / réseau : <tspan
   class="metric"
   id="tspan19"
   style="font-style:normal;font-variant:normal;font-weight:700;font-stretch:normal;font-size:18px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">~ 5 à 8 ms</tspan></text>
  </g>
  <g
     id="g66"
     transform="translate(0.25985219,-21.758758)">
    <text
       class="body"
       x="520"
       y="525"
       id="text21"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">Le coût variable principal est l’inférence IA :</text>
    <text
       class="body"
       x="520"
       y="549"
       id="text22"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• YOLO Global : 3–5 ms</text>
    <text
       class="body"
       x="520"
       y="573"
       id="text23"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• YOLO Tiling : 10–15 ms</text>
    <text
       class="body"
       x="520"
       y="597"
       id="text24"
       style="font-style:normal;font-variant:normal;font-weight:400;font-stretch:normal;font-size:14px;line-height:normal;font-family:'Microsoft Sans Serif', Arial, sans-serif">• Density Map : 22,9 ms</text>
  </g>
  <text
     class="body"
     x="520"
     y="621"
     id="text25">• YOLO-CROWD Tiling : 20–30 ms</text>
  <rect
     class="card"
     x="36"
     y="610"
     width="1050"
     height="390"
     rx="18"
     id="rect25" />
  <text
     class="section"
     x="58"
     y="642"
     id="text26">Comparaison visuelle des latences d’inférence</text>
  <text
     class="small"
     x="58"
     y="668"
     id="text27">Échelle qualitative : plus la barre est longue, plus l’inférence est coûteuse.</text>
  <text
     class="body"
     x="62"
     y="720"
     id="text28">YOLO Global</text>
